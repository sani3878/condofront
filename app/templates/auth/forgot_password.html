{% extends "shared/base.html" %}

{% block content %}
<div class="container">
<div class="row vh-100 align-items-center justify-content-center">
<div class="col-lg-4 col-md-6">
    <div class="text-center mb-4">
        <img style="max-width:280px"
             src="{{ url_for('static', filename='img/logo-horizontal.png') }}">
    </div>
    <div style="background:white;border-radius:18px;padding:40px;
                box-shadow:0 4px 20px rgba(0,0,0,.05);">
        <h5 style="color:#1e3a5f;font-weight:700;">Reset Password</h5>
        <p style="color:#64748b;font-size:.88rem;">
            Enter your email address and we'll send you a reset link.
        </p>
        <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" class="form-control" placeholder="you@example.com">
        </div>
        <button class="btn w-100" style="background:#ff7a00;color:white;
                border-radius:10px;padding:12px;font-weight:600;">
            Send Reset Link
        </button>
        <div class="text-center mt-3">
            <a href="{{ url_for('auth.login') }}"
               style="color:#1e3a5f;font-size:13px;text-decoration:none;">
                ← Back to login
            </a>
        </div>
    </div>
</div>
</div>
</div>
{% endblock %}
