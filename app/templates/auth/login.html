<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CondoFront</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --cf-navy:   #1e3a5f;
            --cf-orange: #f97316;
            --cf-bg:     #f0f4f8;
        }
        body {
            background: var(--cf-bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrap {
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }
        .login-brand {
            background: #fff;
            text-align: center;
            padding-bottom: .8rem;
        }
        .login-logo { max-width: 320px; }
        .login-card {
            border: none;
            border-radius: 18px;
            padding: 42px;
            box-shadow: 0 4px 20px rgba(0,0,0,.05);
        }
        .form-label {
            font-weight: 600;
            font-size: 1.0rem;
            color: #000;
            margin-bottom: .35rem;
        }
        .form-control {
            border-radius: 8px;
            border: 1.5px solid #e2e8f0;
            padding: .6rem .9rem;
            font-size: .95rem;
            transition: border-color .15s, box-shadow .15s;
        }
        .form-control:focus {
            border-color: var(--cf-navy);
            box-shadow: 0 0 0 3px rgba(30,58,95,.1);
        }
        .form-control::placeholder { color: #a9a9a9; opacity: 1; }
        .btn-login {
            background: var(--cf-navy);
            color: #fff;
            border: none;
            border-radius: 8px;
            width: 100%;
            padding: .7rem;
            font-size: 1rem;
            font-weight: 600;
            transition: background .15s;
        }
        .btn-login:hover { background: #152d4a; color: #fff; }
        .forgot-link {
            color: #de6f0e;
            font-size: .9rem;
            font-weight: 600;
            text-decoration: none;
        }
        .forgot-link:hover { color: #f97316; }
        .remember-label {
            font-size: .85rem;
            color: #333;
            cursor: pointer;
            margin: 0;
            user-select: none;
        }
        .divider {
            text-align: center;
            color: #333;
            font-size: .82rem;
            margin: 1.25rem 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: #e2e8f0;
        }
        .divider::before { left: 0; }
        .divider::after  { right: 0; }
        .btn-register-juristic {
            display: block; text-align: center; text-decoration: none;
            background: transparent; color: var(--cf-navy);
            border: 1.5px solid var(--cf-navy);
            border-radius: 8px; padding: .65rem .5rem;
            font-size: .88rem; font-weight: 600;
            transition: all .15s;
        }
        .btn-register-juristic:hover { background: var(--cf-navy); color: #fff; }
        .btn-register-resident {
            display: block; text-align: center; text-decoration: none;
            background: transparent; color: var(--cf-orange);
            border: 1.5px solid var(--cf-orange);
            border-radius: 8px; padding: .65rem .5rem;
            font-size: .88rem; font-weight: 600;
            transition: all .15s;
        }
        .btn-register-resident:hover { background: var(--cf-orange); color: #fff; }
        .version-tag {
            text-align: center;
            color: #94a3b8;
            font-size: .75rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
<div class="login-wrap">

    <!-- Brand -->
    <div class="login-brand">
        <img class="login-logo"
             src="{{ url_for('static', filename='img/logo-horizontal.png') }}"
             alt="CondoFront">
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else category }}
                        alert-dismissible fade show mb-3" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- Login card -->
    <div class="login-card">
        <form method="POST" action="{{ url_for('auth.login') }}">

            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" name="email" class="form-control"
                       placeholder="you@example.com" required autofocus>
            </div>

            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <label class="form-label mb-0">Password</label>
                    <a href="{{ url_for('auth.forgot_password') }}"
                       class="forgot-link" tabindex="-1">Forgot password?</a>
                </div>
                <input type="password" name="password" class="form-control mt-1"
                       placeholder="รหัสผ่าน" required>
            </div>

            <!-- Remember me -->
            <div class="d-flex align-items-center gap-2 mb-3">
                <input type="checkbox" name="remember" id="rememberMe"
                       style="width:16px; height:16px;
                              accent-color: var(--cf-navy); cursor:pointer;">
                <label for="rememberMe" class="remember-label">
                    Remember me / จดจำฉัน
                </label>
            </div>

            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right me-1"></i> Login
            </button>
        </form>

        <div class="divider">ยังไม่มีบัญชี?</div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:.6rem;">
            <a href="{{ url_for('auth.register') }}"
               class="btn-register-juristic">
                🏢 สมัครนิติบุคคล
            </a>
            <a href="{{ url_for('auth.register_resident') }}"
               class="btn-register-resident">
                🏠 สมัครลูกบ้าน
            </a>
        </div>
    </div>

    <div class="version-tag">CondoFront v1.0 — RC1</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
